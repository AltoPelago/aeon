name: Publish Guard

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-publish-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Reject unexpected publish-surface changes
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          echo "$changed"
          if echo "$changed" | grep -E '(^|/)(package\.json|pnpm-workspace\.yaml|\.npmrc|Cargo\.toml|pyproject\.toml)$' >/dev/null; then
            echo "Publish-surface files changed. Ensure this PR receives focused review."
          fi
