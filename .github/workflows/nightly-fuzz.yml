name: Nightly Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

jobs:
  phase-fuzz-nightly:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: implementations/typescript/pnpm-lock.yaml

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@8.14.0 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Phase fuzz (nightly rotation)
        run: pnpm --filter @aeon/phase-fuzz fuzz:nightly
