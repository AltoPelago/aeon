name: Dependency Security

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4

  typescript-dependency-integrity:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce TypeScript lockfile updates
        run: bash ./scripts/check-typescript-lockfile.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: implementations/typescript/pnpm-lock.yaml

      - name: Dependency install integrity check
        working-directory: implementations/typescript
        run: pnpm install --frozen-lockfile --ignore-scripts
